<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Google Meet Background Synthesis</title>
    <style>
      body {
        background: #111;
        color: #0f0;
        display: flex;
        flex-direction: column;
        align-items: center;
        font-family: monospace;
        padding-top: 50px;
      }
      /* 좌우 반전은 여기서 처리 (거울 모드) */
      video {
        width: 640px;
        height: 480px;
        transform: scaleX(-1);
        border: 2px solid #0f0;
        background: #000;
      }
      #log {
        margin-top: 10px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <h2>TFLite 256x256 + Background.jpg Pipeline</h2>

    <video id="outVideo" autoplay playsinline></video>
    <div id="log">카메라 및 파이프라인 초기화 중...</div>

    <div
      id="seg-controller"
      style="
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 10000;
        background: rgba(0, 0, 0, 0.85);
        color: white;
        padding: 20px;
        border-radius: 12px;
        font-family: 'Malgun Gothic', sans-serif;
        width: 260px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        line-height: 1.6;
      "
    >
      <h4
        style="
          margin: 0 0 15px 0;
          border-bottom: 1px solid #555;
          padding-bottom: 5px;
          color: #00ffcc;
        "
      >
        Mask Controller
      </h4>

      <div style="margin-bottom: 15px">
        <label style="font-size: 12px">Coverage Low: <span id="v-low">0.15</span></label>
        <input
          type="range"
          id="s-low"
          min="0"
          max="1"
          step="0.01"
          value="0.15"
          style="width: 100%"
        />
        <label style="font-size: 12px">Coverage High: <span id="v-high">0.90</span></label>
        <input
          type="range"
          id="s-high"
          min="0"
          max="1"
          step="0.01"
          value="0.90"
          style="width: 100%"
        />
      </div>

      <div style="border-top: 1px solid #444; margin: 10px 0; padding-top: 10px">
        <h4 style="margin: 0 0 10px 0; font-size: 13px; color: #ffcc00">Smoothing (Softmax)</h4>
        <label style="font-size: 12px">Diff (기준): <span id="v-diff">0.40</span></label>
        <input
          type="range"
          id="s-diff"
          min="0"
          max="1"
          step="0.01"
          value="0.40"
          style="width: 100%"
        />
        <label style="font-size: 12px">Min Alpha (정지): <span id="v-min">0.10</span></label>
        <input
          type="range"
          id="s-min"
          min="0"
          max="1"
          step="0.01"
          value="0.10"
          style="width: 100%"
        />
        <label style="font-size: 12px">Max Alpha (이동): <span id="v-max">0.90</span></label>
        <input
          type="range"
          id="s-max"
          min="0"
          max="1"
          step="0.01"
          value="0.90"
          style="width: 100%"
        />
      </div>
      <div style="border-top: 1px solid #444; margin: 10px 0; padding-top: 10px">
        <h4 style="margin: 0 0 10px 0; font-size: 13px; color: #ff99cc">Bilateral Filter</h4>
        <label style="font-size: 12px">Sigma Space: <span id="v-space">2.0</span></label>
        <input
          type="range"
          id="s-space"
          min="0"
          max="10"
          step="0.1"
          value="2.0"
          style="width: 100%"
        />
        <label style="font-size: 12px">Sigma Color: <span id="v-color">0.10</span></label>
        <input
          type="range"
          id="s-color"
          min="0"
          max="1"
          step="0.01"
          value="0.10"
          style="width: 100%"
        />
      </div>
      <div style="border-top: 1px solid #444; margin: 10px 0; padding-top: 10px">
        <h4 style="margin: 0 0 10px 0; font-size: 13px; color: #00ffcc">Background & Effects</h4>

        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
          "
        >
          <label style="font-size: 12px">Use Background</label>
          <input type="checkbox" id="c-use-bg" checked />
        </div>

        <label style="font-size: 12px">BG Blur: <span id="v-blur">0</span></label>
        <input type="range" id="s-blur" min="0" max="25" step="1" value="0" style="width: 100%" />

        <label style="font-size: 12px">Brightness: <span id="v-bright">100</span>%</label>
        <input
          type="range"
          id="s-bright"
          min="0"
          max="200"
          step="1"
          value="100"
          style="width: 100%"
        />

        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
          "
        >
          <label style="font-size: 12px">Grayscale (B&W)</label>
          <input type="checkbox" id="c-gray" />
        </div>
      </div>
    </div>
    <script src="pipeline.js"></script>
    <script>
      const videoElement = document.getElementById('outVideo');
      const logElement = document.getElementById('log');

      let _cachedBg = null;

      async function getBase64FromImage(url) {
        try {
          const response = await fetch(url);
          const blob = await response.blob();
          return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () => {
              const base64data = reader.result.split(',')[1];
              resolve(base64data);
            };
            reader.readAsDataURL(blob);
          });
        } catch (e) {
          console.error('배경 이미지 로드 실패:', e);
          return null;
        }
      }

      async function start() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { width: 640, height: 480 },
          });
          const processedStream = window.createCustomVideoStream(stream);
          videoElement.srcObject = processedStream;

          // 이미지 미리 한 번 로드
          _cachedBg = await getBase64FromImage('background.jpg');

          // 초기 가동 (배경 있음)
          applyBackgroundConfig();

          logElement.innerText = '합성 가동 중 (256x256)';
          setTimeout(initSliders, 2000);
        } catch (err) {
          logElement.innerText = '에러: ' + err.message;
        }
      }

      // 네가 말한 "배경 관련 값만 보고 config 호출하는 메서드"
      function applyBackgroundConfig() {
        const useBg = document.getElementById('c-use-bg').checked;
        const blurSlider = document.getElementById('s-blur');
        const brightSlider = document.getElementById('s-bright');
        const grayCheck = document.getElementById('c-gray');

        // 블러 범위가 100까지니까 슬라이더의 max값도 맞춰줘야 함
        blurSlider.max = 100;

        const blurVal = parseFloat(blurSlider.value);
        const brightVal = parseFloat(brightSlider.value);
        const isGray = grayCheck.checked;

        // 핵심: 배경 체크 없으면 null 대신 빈 문자열("") 전달
        window.configCustomVideoStream({
          background: useBg ? _cachedBg : '',
          blur: blurVal,
          mirror: false,
          degree: 360,
          brightness: brightVal,
          grayscale: isGray ? 100 : 0,
        });
      }
      function initSliders() {
        // 기존 마스크 관련 슬라이더
        const maskIds = ['low', 'high', 'diff', 'min', 'max', 'space', 'color'];
        const maskEls = {};
        maskIds.forEach((id) => {
          maskEls[id] = {
            slider: document.getElementById('s-' + id),
            text: document.getElementById('v-' + id),
          };
        });

        // 배경 관련 엘리먼트
        const bgControls = ['s-blur', 's-bright', 'c-use-bg', 'c-gray'];

        // 1. 기존 마스크 업데이트 로직 (엔진 내부 파라미터만 수정)
        function updateMaskParams() {
          const val = {};
          maskIds.forEach((id) => {
            val[id] = parseFloat(maskEls[id].slider.value);
            maskEls[id].text.innerText = val[id].toFixed(2);
          });

          if (window._webgl2Pipeline) {
            _postProcessingConfig.coverage = [val.low, val.high];
            _webgl2Pipeline.updatePostProcessingConfig(_postProcessingConfig);

            if (_webgl2Pipeline.updateAlphaParams) {
              _webgl2Pipeline.updateAlphaParams(val.diff, val.min, val.max);
            }
            if (_webgl2Pipeline.updateBilateralParams) {
              _webgl2Pipeline.updateBilateralParams(val.space, val.color);
            }
          }
        }

        // 마스크 슬라이더 이벤트 연결
        maskIds.forEach((id) => maskEls[id].slider.addEventListener('input', updateMaskParams));

        // 2. 배경 설정 이벤트 연결 (네가 만든 메서드 호출)
        bgControls.forEach((id) => {
          const el = document.getElementById(id);
          const eventType = el.type === 'checkbox' ? 'change' : 'input';

          el.addEventListener(eventType, () => {
            // 수치 표시 업데이트 (텍스트 레이블 있는 경우만)
            const vSpan = document.getElementById('v-' + id.split('-')[1]);
            if (vSpan) vSpan.innerText = el.value;

            // 바로 배경 메서드 실행
            applyBackgroundConfig();
          });
        });

        updateMaskParams(); // 초기 마스크 세팅
      }

      start();
    </script>
  </body>
</html>
